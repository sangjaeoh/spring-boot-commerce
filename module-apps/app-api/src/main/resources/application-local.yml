# 루트 docker-compose.yml의 PostgreSQL과 일치하는 로컬 접속 정보다.
spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/commerce
    username: commerce
    password: commerce

auth:
  jwt:
    # 로컬 전용 개발 키. 운영 키는 환경변수(AUTH_JWT_SECRET)로만 주입한다.
    secret: ${AUTH_JWT_SECRET:local-dev-only-secret-key-32bytes-min!}

payment:
  webhook:
    # 로컬 전용 개발 시크릿. 운영 시크릿은 환경변수(PAYMENT_WEBHOOK_SECRET)로만 주입한다.
    secret: ${PAYMENT_WEBHOOK_SECRET:local-dev-only-webhook-secret}
