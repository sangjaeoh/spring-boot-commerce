spring:
  application:
    name: app-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

logging:
  structured:
    format:
      # ECS(Elastic Common Schema) — 필드명이 공개 명세라 특정 수집기 제품에 결합되지 않는다.
      # 전 프로필 동일 포맷(local 포함) — 프로필 간 로그 형상이 갈리면 로컬에서 검증한 파싱이 배포에서 깨진다.
      console: ecs

springdoc:
  # 의도적 기본 비노출 — API 문서·swagger-ui는 개발 표면이라 로컬 환경(local 프로필·compose full)에서만 연다.
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        # 의도적 최소 노출 — health만. metrics는 수집기가 없어 소비자가 없으므로 노출하지 않는다.
        include: health
  endpoint:
    health:
      probes:
        # 쿠버네티스 밖에서도 /actuator/health/{liveness,readiness} 프로브 그룹을 연다.
        enabled: true

auth:
  jwt:
    # HS256 대칭 서명 키(32바이트 이상). 기본값 없이 환경변수로만 주입한다(REQUIREMENTS.md 제약·전제).
    secret: ${AUTH_JWT_SECRET}
    access-token-ttl: 1h

order:
  reconciliation:
    # 생성 후 이 유예가 지나도록 PENDING인 주문만 스윕 대상이다. 결제 리컨실 유예 이상으로 두어(진행 중 체크아웃과
    # 경합 차단 + payment 행 있는 PENDING은 결제 리컨실에 먼저 잡힘), payment 행 없는 잔여만 스윕이 종결한다.
    stale-after: 15m
    fixed-delay: 5m

payment:
  reconciliation:
    # 생성 후 이 유예가 지나도록 REQUESTED인 결제만 리컨실·웹훅 확정 대상이다(동기 체크아웃과의 경합 차단).
    stale-after: 10m
    fixed-delay: 1m
  webhook:
    # PG와 공유하는 HMAC-SHA256 서명 시크릿. 기본값 없이 환경변수로만 주입한다(JWT 키와 동일 규약).
    secret: ${PAYMENT_WEBHOOK_SECRET}
