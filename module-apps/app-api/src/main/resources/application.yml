server:
  # 배포 재시작 시 진행 중 요청(체크아웃 등 돈의 경로)을 끊지 않고 마치고 내려가도록 graceful 종료한다.
  # Tomcat 스레드(기본 max 200)는 그대로 둔다 — 풀 병목이 커넥션(아래 maximum-pool-size)이라
  # 스레드를 늘려도 커넥션 대기만 늘어 이득이 없다.
  shutdown: graceful

spring:
  application:
    name: app-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  lifecycle:
    # graceful 종료가 진행 중 요청을 마칠 최대 대기. 동기 결제 최대 처리 시간을 넘도록 두되 배포
    # 오케스트레이터의 종료 유예 안에 들도록 30s로 둔다. @Scheduled 리컨실·PENDING 스윕은 확정이
    # 멱등이라(REQUIREMENTS 비기능·제약) 종료 중 중단돼도 다음 주기가 수렴시키므로 별도 대기를 두지 않는다.
    # 단 비정상 종료(SIGKILL 등)로 스윕 분산 락이 남으면 전 노드의 해당 스윕 재개가 lockAtMostFor(10분)
    # 만료까지 늦어진다(REQUIREMENTS 제약·전제).
    timeout-per-shutdown-phase: 30s
  datasource:
    hikari:
      # Postgres 기본 max_connections=100 전제. 인스턴스당 10으로 두어 다중 인스턴스·마이그레이션·운영
      # 도구 커넥션과 합쳐도 여유를 남긴다(동기 결제 경로가 짧아 풀 회전이 빠르다).
      maximum-pool-size: 10
      # 풀 고갈 시 기본 30s까지 매달리지 않고 10s에 빠르게 실패시켜, 대기 요청이 스레드를 고갈시키지 않게 한다.
      connection-timeout: 10000
      # 커넥션 최대 수명(30분). DB·프록시가 커넥션을 끊는 시간보다 짧게 두어 죽은 커넥션을 미리 회수한다.
      max-lifetime: 1800000

logging:
  structured:
    format:
      # ECS(Elastic Common Schema) — 필드명이 공개 명세라 특정 수집기 제품에 결합되지 않는다.
      # 전 프로필 동일 포맷(local 포함) — 프로필 간 로그 형상이 갈리면 로컬에서 검증한 파싱이 배포에서 깨진다.
      console: ecs

springdoc:
  # 의도적 기본 비노출 — API 문서·swagger-ui는 개발 표면이라 로컬 환경(local 프로필·compose full)에서만 연다.
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        # 관측 최소셋 — health와 metrics만. metrics는 커넥션 풀(hikari)·HTTP 상태(409 비율)·스윕/보상
        # 카운터를 노출해 조용한 잔존·보상 실패를 감지한다(내부망 전제, PII·시크릿 미포함).
        include: health,metrics
  endpoint:
    health:
      probes:
        # 쿠버네티스 밖에서도 /actuator/health/{liveness,readiness} 프로브 그룹을 연다.
        enabled: true
      group:
        # readiness = 트래픽 수용 준비 = 앱 기동 + DB·Redis 도달. 컨테이너·오케스트레이터 헬스체크가 이 그룹을 본다.
        # liveness에는 DB·Redis를 넣지 않는다(기본 livenessState만) — 일시적 저장소 장애로 컨테이너가 재기동되면 복구가 늦다.
        readiness:
          include: readinessState,db,redis

auth:
  jwt:
    # HS256 대칭 서명 키(32바이트 이상). 기본값 없이 환경변수로만 주입한다(REQUIREMENTS.md 제약·전제).
    secret: ${AUTH_JWT_SECRET}
    access-token-ttl: 1h
  # 리프레시 토큰(불투명 랜덤 토큰) 수명. Redis TTL로 강제되고 로그아웃 시 즉시 무효화된다.
  refresh-token-ttl: 336h

order:
  reconciliation:
    # 생성 후 이 유예가 지나도록 PENDING인 주문만 스윕 대상이다. 결제 리컨실 유예 이상으로 두어(진행 중 체크아웃과
    # 경합 차단 + payment 행 있는 PENDING은 결제 리컨실에 먼저 잡힘), payment 행 없는 잔여만 스윕이 종결한다.
    stale-after: 15m
    fixed-delay: 5m

payment:
  reconciliation:
    # 생성 후 이 유예가 지나도록 REQUESTED인 결제만 리컨실·웹훅 확정 대상이다(동기 체크아웃과의 경합 차단).
    stale-after: 10m
    fixed-delay: 1m
  webhook:
    # PG와 공유하는 HMAC-SHA256 서명 시크릿. 기본값 없이 환경변수로만 주입한다(JWT 키와 동일 규약).
    secret: ${PAYMENT_WEBHOOK_SECRET}
