server:
  # 배포 재시작 시 진행 중 웹훅 확정 요청을 끊지 않고 마치고 내려가도록 graceful 종료한다.
  shutdown: graceful

spring:
  application:
    name: app-batch
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  lifecycle:
    # graceful 종료가 진행 중 요청을 마칠 최대 대기. 스케줄 스윕은 확정이 멱등이라(REQUIREMENTS 비기능·제약)
    # 종료 중 중단돼도 다음 주기가 수렴시키므로 별도 대기를 두지 않는다. 단 비정상 종료(SIGKILL 등)로 스윕
    # 분산 락이 남으면 전 노드의 해당 스윕 재개가 lockAtMostFor(10분) 만료까지 늦어진다(REQUIREMENTS 제약·전제).
    timeout-per-shutdown-phase: 30s
  datasource:
    hikari:
      # app-api와 같은 전제(Postgres 기본 max_connections=100 공유). 스윕·웹훅 부하가 작아 인스턴스당
      # 10이면 충분하고, 다른 앱·마이그레이션·운영 도구 커넥션과 합쳐도 여유를 남긴다.
      maximum-pool-size: 10
      # 풀 고갈 시 기본 30s까지 매달리지 않고 10s에 빠르게 실패시킨다.
      connection-timeout: 10000
      # 커넥션 최대 수명(30분). DB·프록시가 커넥션을 끊는 시간보다 짧게 두어 죽은 커넥션을 미리 회수한다.
      max-lifetime: 1800000

logging:
  structured:
    format:
      # ECS(Elastic Common Schema) — 전 앱 동일 포맷(app-api와 같은 근거).
      console: ecs

management:
  endpoints:
    web:
      exposure:
        # 관측 최소셋 — health와 metrics만. metrics는 스윕/보상 카운터를 노출해 조용한 잔존·보상 실패를
        # 감지한다(내부망 전제, PII·시크릿 미포함).
        include: health,metrics
  endpoint:
    health:
      probes:
        # 쿠버네티스 밖에서도 /actuator/health/{liveness,readiness} 프로브 그룹을 연다.
        enabled: true
      group:
        # readiness = 기동 + DB·Redis(스윕 분산 락) 도달. liveness에는 저장소를 넣지 않는다(app-api와 같은 근거).
        readiness:
          include: readinessState,db,redis

order:
  reconciliation:
    # 생성 후 이 유예가 지나도록 PENDING인 주문만 스윕 대상이다. 결제 리컨실 유예 이상으로 두어(진행 중 체크아웃과
    # 경합 차단 + payment 행 있는 PENDING은 결제 리컨실에 먼저 잡힘), payment 행 없는 잔여만 스윕이 종결한다.
    stale-after: 15m
    fixed-delay: 5m

payment:
  reconciliation:
    # 생성 후 이 유예가 지나도록 REQUESTED인 결제만 리컨실·웹훅 확정 대상이다(동기 체크아웃과의 경합 차단).
    stale-after: 10m
    fixed-delay: 1m
  webhook:
    # PG와 공유하는 HMAC-SHA256 서명 시크릿. 기본값 없이 환경변수로만 주입한다(REQUIREMENTS.md 제약·전제).
    secret: ${PAYMENT_WEBHOOK_SECRET}
