# 루트 docker-compose.yml의 PostgreSQL·Redis와 일치하는 로컬 접속 정보다.
spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/commerce
    username: commerce
    password: commerce
  data:
    redis:
      host: localhost
      port: 56379

payment:
  webhook:
    # 로컬 전용 개발 시크릿. 운영 시크릿은 환경변수(PAYMENT_WEBHOOK_SECRET)로만 주입한다.
    secret: ${PAYMENT_WEBHOOK_SECRET:local-dev-only-webhook-secret}
