spring:
  application:
    name: app-migration
  # 스키마별 Flyway 실행은 SchemaFlywayFactory가 프로그램적으로 담당한다. 현재 Boot Flyway 오토컨피그
  # (spring-boot-flyway)는 클래스패스에 없어 무효과지만, starter-flyway가 (전이로) 들어오면 기본 Flyway가
  # classpath:db/migration을 재귀 스캔해 7개 V1__를 버전 충돌로 읽으므로 방어적으로 끈다.
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

logging:
  structured:
    format:
      # app-api와 같은 ECS 구조화 로깅 — 마이그레이션 로그도 동일 파이프라인으로 수집·파싱한다.
      console: ecs
