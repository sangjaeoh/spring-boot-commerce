# 루트 docker-compose.yml의 PostgreSQL·Redis와 일치하는 로컬 접속 정보다.
spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/commerce
    username: commerce
    password: commerce
  data:
    redis:
      host: localhost
      port: 56379

springdoc:
  # 로컬에서만 API 문서·swagger-ui를 연다(기본은 비노출).
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

auth:
  jwt:
    # 로컬 전용 개발 키 — 발급 앱(app-api)의 로컬 키와 같은 값이다. 운영 키는 환경변수(AUTH_JWT_SECRET)로만 주입한다.
    secret: ${AUTH_JWT_SECRET:local-dev-only-secret-key-32bytes-min!}
  admin:
    # 로컬 전용 관리자 시딩 계정 — README 스모크(상품 등록)가 쓴다. 운영은 환경변수로만 주입한다.
    email: ${AUTH_ADMIN_EMAIL:admin@local.dev}
    password: ${AUTH_ADMIN_PASSWORD:local-admin-password}
