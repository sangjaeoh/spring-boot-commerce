# 로컬 실행용 PostgreSQL. DB·계정·포트는 app-api/app-migration의 local 프로필과 일치한다.
# 호스트 포트는 개발자 로컬의 기존 PostgreSQL(5432)과 충돌하지 않도록 55432를 쓴다.
services:
  postgres:
    image: postgres:17-alpine
    container_name: commerce-postgres
    environment:
      POSTGRES_DB: commerce
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce -d commerce"]
      interval: 2s
      timeout: 2s
      retries: 15
